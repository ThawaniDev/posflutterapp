name: wameedpos
description: "Wameed POS - Point of Sale system for Oman market"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.8.0
  connectivity_plus: ^6.1.4

  # Routing
  go_router: ^14.8.1

  # Local Storage & Auth
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  crypto: ^3.0.6

  # Offline Sync (POS terminal)
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  uuid: ^4.5.1

  # Audio
  audioplayers: ^6.1.0

  # UI & Theming
  cupertino_icons: ^1.0.8
  fl_chart: ^0.70.2

  # Formatting
  intl: ^0.20.2

  # Printing
  pdf: ^3.11.3
  printing: ^5.14.2

  # Barcode
  barcode: ^2.2.8

  # Barcode Scanning (PDA / DataWedge)
  flutter_datawedge: ^3.2.0
  android_intent_plus: ^5.1.0

  # ZATCA Crypto
  pointycastle: ^4.0.0

  # Window Management (desktop)
  window_manager: ^0.4.3

  # URL Launcher
  url_launcher: ^6.3.2

  # Payment Gateway
  flutter_paytabs_bridge: ^2.7.2

  # EdfaPay SoftPOS (NFC tap-to-pay on Android)
  edfapay_softpos_sdk: ^1.0.6+6

  # Image Picker
  image_picker: ^1.1.2
  flutter_html: ^3.0.0-beta.2

  # Monitoring
  sentry_flutter: ^8.14.2
  webview_flutter: ^4.13.1
  webview_win_floating: ^3.0.2
  web: ^1.1.1

  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  firebase_analytics: ^12.3.0
  firebase_crashlytics: ^5.2.0
  firebase_performance: ^0.11.3
  flutter_local_notifications: ^19.0.0
  package_info_plus: ^9.0.1

  # Markdown rendering (for AI chat / feature responses)
  flutter_markdown_plus: ^1.0.7
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  mockito: ^5.4.6
  change_app_package_name: ^1.4.0
  drift_dev: ^2.20.0
  integration_test:
    sdk: flutter

  flutter_launcher_icons: "^0.14.4"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/new_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/small_icon_new.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/images/new_icon_rounded.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/images/new_icon_rounded.png"
flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/icons/
    - assets/audio/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900
