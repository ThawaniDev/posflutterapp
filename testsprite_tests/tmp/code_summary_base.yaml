version: "2"
type: backend
tech_stack:
  - language: Dart
  - framework: Flutter
  - state_management: Riverpod (flutter_riverpod ^2.6.1)
  - routing: GoRouter (go_router ^14.8.1)
  - local_db: Drift + SQLite (offline-first)
  - networking: Dio
  - auth: flutter_secure_storage, PIN/biometric login
  - printing: pdf, printing, ESC/POS thermal
  - barcode: barcode, flutter_datawedge
  - crypto: pointycastle (ZATCA ECDSA signing)
  - charts: fl_chart
  - localization: flutter_localizations, intl (AR/EN, RTL/LTR)

routes:
  - path: /login
    file: lib/features/auth/pages/login_page.dart
    auth_required: false
    description: Email/password login
  - path: /login/pin
    file: lib/features/auth/pages/pin_login_page.dart
    auth_required: false
    description: Fast PIN login for cashiers
  - path: /register
    file: lib/features/auth/pages/register_page.dart
    auth_required: false
    description: New store registration / onboarding
  - path: /dashboard
    file: lib/features/dashboard/pages/owner_dashboard_page.dart
    auth_required: true
    description: Owner analytics dashboard
  - path: /pos
    file: lib/features/pos_terminal/pages/pos_terminals_page.dart
    auth_required: true
    description: POS terminal selector
  - path: /pos/checkout
    file: lib/features/pos_terminal/pages/pos_checkout_page.dart
    auth_required: true
    description: Active POS checkout screen
  - path: /pos/shift/open
    file: lib/features/pos_terminal/pages/pos_shift_open_page.dart
    auth_required: true
    description: Open a new cash shift
  - path: /pos/sessions
    file: lib/features/pos_terminal/pages/pos_sessions_page.dart
    auth_required: true
    description: View past POS sessions
  - path: /pos/terminals
    file: lib/features/pos_terminal/pages/pos_terminals_page.dart
