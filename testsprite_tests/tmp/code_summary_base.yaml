    description: Manage POS terminals
  - path: /pos/cfd/:sessionId
    file: lib/features/pos_terminal/pages/pos_cfd_page.dart
    auth_required: false
    description: Customer-facing display (second screen)
  - path: /products
    file: lib/features/catalog/pages/product_list_page.dart
    auth_required: true
    description: Product catalogue list
  - path: /products/add
