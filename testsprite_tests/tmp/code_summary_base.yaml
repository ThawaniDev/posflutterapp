    description: Custom label designer
  - path: /reports
    file: lib/features/reports/pages/reports_page.dart
    auth_required: true
    description: Reports hub
  - path: /reports/sales-summary
    file: lib/features/reports/pages/sales_summary_page.dart
    auth_required: true
    description: Daily/weekly/monthly sales summary
  - path: /reports/staff-performance
    file: lib/features/reports/pages/staff_performance_page.dart
    auth_required: true
    description: Employee performance and commissions
  - path: /settings
    file: lib/features/settings/pages/settings_page.dart
    auth_required: true
    description: App settings hub
  - path: /settings/localization
    file: lib/features/settings/pages/localization_page.dart
    auth_required: true
