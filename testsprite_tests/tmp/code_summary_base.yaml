    description: Add new product
  - path: /products/import
    file: lib/features/catalog/pages/product_import_page.dart
    auth_required: true
    description: Bulk product import CSV/Excel
  - path: /categories
    file: lib/features/catalog/pages/category_list_page.dart
    auth_required: true
    description: Product category management
  - path: /suppliers
    file: lib/features/catalog/pages/supplier_list_page.dart
    auth_required: true
    description: Supplier database
  - path: /inventory
    file: lib/features/inventory/pages/inventory_page.dart
    auth_required: true
    description: Inventory overview
  - path: /inventory/stock-levels
    file: lib/features/inventory/pages/stock_levels_page.dart
    auth_required: true
    description: Real-time stock levels per branch
  - path: /inventory/stock-movements
    file: lib/features/inventory/pages/stock_movements_page.dart
    auth_required: true
    description: Stock movement history log
  - path: /inventory/goods-receipts
    file: lib/features/inventory/pages/goods_receipts_page.dart
    auth_required: true
    description: Receive goods from purchase orders
  - path: /inventory/stock-adjustments
    file: lib/features/inventory/pages/stock_adjustments_page.dart
    auth_required: true
